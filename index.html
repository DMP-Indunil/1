<!DOCTYPE html>
<html>
<head>
<title>Only One Choice ❤️</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  padding-top: 100px;
  overflow: hidden;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  background-color: #00ff88;
  left: 45%;
  top: 60%;
}

#noBtn {
  background-color: #ff4444;
  left: 55%;
  top: 60%;
}
</style>
</head>

<body>

<h1>Hi My Beautiful ❤️</h1>
<h2>Will You Be Mine Forever?</h2>

<button id="yesBtn" onclick="yesAnswer()">YES 😍</button>
<button id="noBtn">NO 😅</button>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function yesAnswer() {
  document.body.innerHTML = "<h1>I Knew You’d Say YES ❤️💍</h1><h2>You Just Made Me The Happiest Man Alive 😍</h2>";
}
</script>

</body>
</html>
